[package]
name = "hyperast_gen_ts_java"
version = "0.5.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
tree-sitter = { workspace = true, optional = true }
streaming-iterator = { workspace = true } # used for recent versions of tree-sitter
tree-sitter-java = { version = "0.23.0", optional = true }
num = "0.4.0"
bitvec = "1.0.1"
string-interner = { version = "0.17.0", optional = true }
cfg-if = "1.0"
hashbrown = { version = "0.14.5", default-features = false, optional = true }
log = { version = "0.4.6" }

hyperast = { path = "../../../crates/hyper_ast", default-features = false }
tree-sitter-graph = { workspace = true, optional = true }
stack-graphs = { version = "0.14.0", optional = true }

libc = "0.2"

legion = { workspace = true, optional = true }
tuples = "=1.4.1"

enumset = "1.0.8"



serde = "1.0.130"

[build-dependencies]
cc = "*"

[dev-dependencies]
pretty_assertions = "1.0.0"
env_logger = "0.11.3"
criterion = { workspace = true }
hyperast_tsquery = { workspace = true }
hyperast_gen_ts_tsquery = { workspace = true }

polyglot = { path="../../../lib/polyglot" }

[[example]]
name = "querying"
required-features = ["impl", "tsg", "all_examples"]

[[example]]
name = "tsg"
required-features = ["impl", "tsg", "all_examples"]

[[example]]
name = "querying_immediate_pred"
required-features = ["impl", "tsg", "all_examples"]

[[example]]
name = "querying_precompute"
required-features = ["impl", "tsg", "all_examples"]

[[bench]]
name = "querying_precompute"
harness = false

[[bench]]
name = "querying_precompute_repeat"
harness = false

[[bench]]
name = "querying_precompute_repeat2"
harness = false

[[bench]]
name = "querying_precompute_repeat3"
harness = false

[[bench]]
name = "querying_precompute_repeat4"
harness = false

[[example]] # NOTE it's an helper bin dressed as an example to access dev-dependencies
name = "regen_java_types"
path = "bin/regen_java_types.rs"

[features]
default = ["impl"]

# TODO cleanly separate features, for now impl needs it
impl = [
    "types",
    "hyperast/jemalloc",
    "legion",
    "hyperast/native",
    "dep:hashbrown",
    "hashbrown?/ahash",
    "ts",
    "scripting",
    "hyperast_gen_ts_tsquery/impl",
]
types = []
legion = ["hyperast/legion", "dep:legion"]
ts = [
    "dep:tree-sitter",
    "dep:tree-sitter-java",
    "hyperast_gen_ts_tsquery/ts",
    "hyperast/ts",
]
tsg = [
    # "dep:tree-sitter-graph",
    # "dep:stack-graphs",
    # "dep:tree-sitter-stack-graphs",
]
impact = [
    "dep:string-interner",
]
subtree-stats = ["hyperast/subtree-stats"]
scripting = ["hyperast/scripting"]
all_examples = []
bevy = ["hyperast/bevy_ecs"]
