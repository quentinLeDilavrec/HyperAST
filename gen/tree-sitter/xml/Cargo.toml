[package]
name = "hyperast_gen_ts_xml"
version = "0.5.0"
edition = "2024"

[lints]
workspace = true

[dependencies]
tree-sitter = { workspace = true, optional = true }
tree-sitter-xml = { version = "0.7.0", optional = true }
hyperast = { path = "../../../crates/hyper_ast", default-features = false }

hashbrown = { version = "0.14.5", default-features = false, optional = true }
log = { version = "0.4.6" }

num = "0.4.0"

libc = "0.2"

legion = { workspace = true, optional = true }

[dev-dependencies]
pretty_assertions = "1.0.0"

polyglot = { path="../../../lib/polyglot" }

[[example]] # NOTE it's an helper bin dressed as an example to access dev-dependencies
name = "regen_xml_types"
path = "bin/regen_xml_types.rs"


[features]
default = ["impl"]
impl = [
    "types",
    "hyperast/jemalloc",
    "legion",
    "hyperast/native",
    "dep:hashbrown",
    "hashbrown?/ahash",
    "hyperast/ts",
    "ts"
]
types = []
legion = ["hyperast/legion", "dep:legion"]
ts = [
    "dep:tree-sitter",
    "dep:tree-sitter-xml",
    "hyperast/ts",
]
